# Phase 2: Dilution Series — 75% watermarked
phase: phase2
condition: d75

pretrained_model_name_or_path: stable-diffusion-v1-5/stable-diffusion-v1-5
vae_model_name_or_path: stabilityai/sd-vae-ft-mse

train_data_dir: data/phase2_d75
caption_file: metadata.jsonl
watermarked_ratio: 0.75
total_images: 2000

resolution: 512
train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1e-6
lr_scheduler: constant
lr_warmup_steps: 0
max_train_steps: 10000
checkpointing_steps: 500
seed: 42

mixed_precision: bf16
gradient_checkpointing: true
use_xformers: true

report_to: wandb
wandb_project: sigil-training-survival

num_generate_per_category: 150
generation_seed: 77
guidance_scale: 7.5
num_inference_steps: 50

output_dir: checkpoints/phase2/d75-seed42
